<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>评论区</title>
    <style>
        body { max-width: 800px; margin: 50px auto; padding: 0 20px; font-family: Arial; }
        .form { margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #2ea44f; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .comment { padding: 15px; border-bottom: 1px solid #eee; }
        .name { font-weight: bold; }
        .time { color: #888; font-size: 12px; margin-left: 10px; }
    </style>
</head>
<body>
    <h1>评论区</h1>
    <div class="form">
        <input id="name" placeholder="你的昵称">
        <textarea id="content" rows="4" placeholder="说点什么..."></textarea>
        <button onclick="submitComment()">提交评论</button>
    </div>
    <div id="commentList"></div>

    <script>
        // 已更新为你的后端主域名
        const API_URL = "https://pages-comment-backend.vercel.app";

        // 页面加载时获取评论
        fetch(`${API_URL}/api/comments`)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("commentList");
                if (data.status === "success" && data.comments.length > 0) {
                    list.innerHTML = data.comments.map(c => `
                        <div class="comment">
                            <span class="name">${c.name}</span>
                            <span class="time">${c.time}</span>
                            <p>${c.content}</p>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = "<p>暂无评论，快来抢沙发！</p>";
                }
            })
            .catch(err => console.error("加载失败：", err));

        // 提交评论
        function submitComment() {
            const name = document.getElementById("name").value.trim();
            const content = document.getElementById("content").value.trim();
            if (!name || !content) return alert("请填写完整！");

            fetch(`${API_URL}/api/comment`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name, content })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    alert("提交成功！");
                    location.reload(); // 刷新页面
                } else {
                    alert("失败：" + data.message);
                }
            })
            .catch(err => alert("网络错误，请稍后再试"));
        }
    </script>
</body>
</html>
