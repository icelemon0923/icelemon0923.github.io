<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航栏 + 侧边栏 · 箭头控制伸缩</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 主题变量定义 (白天/黑夜) */
        :root {
            --bg-body: #f0f4f8;
            --header-bg: rgba(255, 255, 255, 0.9);
            --header-border: #eef2f6;
            --text-primary: #0b1e33;
            --text-secondary: #2c3e50;
            --text-muted: #64748b;
            --sidebar-bg: rgba(255, 255, 255, 0.8);
            --sidebar-border: #eef2f8;
            --item-hover: #f0f4ff;
            --item-active-bg: #ffffff;
            --item-active-border: #cddcff;
            --accent-color: #1e3a8a;
            --accent-hover: #2563eb;
            --btn-bg: #f8fafd;
            --btn-border: #dde3ed;
            --main-content-bg: rgba(255,255,255,0.5);
            --shadow-color: rgba(0, 20, 40, 0.1);
            --announcement-bg: #f8fafd;
        }

        body.dark-theme {
            --bg-body: #121826;
            --header-bg: rgba(20, 28, 45, 0.95);
            --header-border: #2a3442;
            --text-primary: #e6edf5;
            --text-secondary: #b0c4de;
            --text-muted: #8896a8;
            --sidebar-bg: rgba(26, 34, 50, 0.9);
            --sidebar-border: #2e3a4a;
            --item-hover: #1e2b3c;
            --item-active-bg: #1e2f44;
            --item-active-border: #3a5070;
            --accent-color: #5f8aff;
            --accent-hover: #7b9eff;
            --btn-bg: #1e2a3a;
            --btn-border: #384659;
            --main-content-bg: rgba(26, 34, 50, 0.5);
            --shadow-color: rgba(0, 0, 0, 0.4);
            --announcement-bg: #1e2a3a;
        }

        body {
            background: var(--bg-body);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        /* ---------- 顶部导航栏 ---------- */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            background: var(--header-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--header-border);
            box-shadow: 0 2px 10px var(--shadow-color);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .navbar {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0.6rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: nowrap;
        }

        /* 左侧区域 (三道杠 + Logo) - 三道杠不再控制侧边栏 */
        .left-area {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-shrink: 0;
        }

        /* 三道杠按钮 - 现在不做任何操作，仅作为装饰 */
        .menu-toggle-btn {
            background: transparent;
            border: 1px solid var(--btn-border);
            border-radius: 30px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: var(--text-secondary);
            cursor: default;  /* 不再可点击 */
            transition: all 0.2s;
            background: var(--btn-bg);
            opacity: 0.8;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--accent-color);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        .brand-name {
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: -0.3px;
            color: var(--text-primary);
            white-space: nowrap;
        }

        /* 导航菜单 */
        .nav-menu {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            list-style: none;
            margin: 0 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-item {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1rem;
            color: var(--text-secondary);
            transition: all 0.15s;
            cursor: pointer;
            white-space: nowrap;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--item-hover);
            color: var(--accent-color);
            border-color: var(--item-active-border);
        }

        .nav-item.active {
            background: var(--item-active-bg);
            color: var(--accent-color);
            border-color: var(--item-active-border);
            font-weight: 530;
            box-shadow: 0 2px 6px var(--shadow-color);
        }

        /* 右侧操作区 (登录/注册 + 主题切换) */
        .action-buttons {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-shrink: 0;
        }

        .btn-text {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            padding: 0.3rem 0.2rem;
            transition: color 0.15s;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }

        .btn-text:hover {
            color: var(--accent-color);
            border-bottom-color: var(--accent-color);
        }

        .btn-text.register {
            color: var(--accent-color);
            font-weight: 600;
        }

        /* 主题切换按钮 */
        .theme-toggle {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 30px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background: var(--item-hover);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* 移动端菜单 (保持不变) */
        .mobile-toggle {
            display: none;
            align-items: center;
            margin-left: 0.5rem;
        }

        #menu-check {
            display: none;
        }

        .hamburger-icon {
            font-size: 1.8rem;
            line-height: 1;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0 0.2rem;
            font-weight: 300;
        }

        .menu-overlay {
            display: none;
        }

        /* 响应式 900px */
        @media screen and (max-width: 900px) {
            .navbar {
                padding: 0.5rem 1.2rem;
            }
            .nav-menu {
                display: none;
            }
            .mobile-toggle {
                display: flex;
            }
            #menu-check:checked ~ .nav-menu {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: var(--header-bg);
                backdrop-filter: blur(16px);
                padding: 1.5rem 2rem;
                gap: 0.5rem;
                box-shadow: 0 20px 24px -12px var(--shadow-color);
                border-radius: 0 0 20px 20px;
                border-bottom: 1px solid var(--header-border);
                z-index: 1001;
            }
            #menu-check:checked ~ .nav-menu .nav-item {
                width: 100%;
                font-size: 1.1rem;
                padding: 0.7rem 1.2rem;
            }
            #menu-check:checked ~ .menu-overlay {
                display: block;
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: transparent;
                z-index: 999;
            }
        }

        /* ---------- 主布局容器 ---------- */
        .app-container {
            display: flex;
            max-width: 1400px;
            margin: 1rem auto 0;
            padding: 0 2rem;
            gap: 1.5rem;
            position: relative;
        }

        /* ---------- 侧边栏 (由内部小箭头控制伸缩) ---------- */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 10px 30px -8px var(--shadow-color);
            padding: 1.5rem 1rem;
            border: 1px solid var(--sidebar-border);
            transition: width 0.3s cubic-bezier(0.2, 0.9, 0.3, 1), 
                        padding 0.3s ease, 
                        background-color 0.3s,
                        border-color 0.3s;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
            height: fit-content;
        }

        /* 收缩状态 - 只露出一个小箭头 */
        .sidebar.collapsed {
            width: 48px;
            padding: 1.5rem 0;
            cursor: default;
            background: transparent;  /* 完全透明，只留箭头 */
            box-shadow: none;
            border: none;
            backdrop-filter: none;
        }

        /* 侧边栏内部内容容器 */
        .sidebar-content {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            opacity: 1;
            transition: opacity 0.2s ease 0.05s;
            white-space: nowrap;
        }

        .sidebar.collapsed .sidebar-content {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        /* 公告头部 */
        .announcement-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .announcement-header h3 {
            font-size: 1.1rem;
        }

        /* 小箭头按钮 - 唯一控制侧边栏伸缩的元素 */
        .sidebar-arrow {
            background: var(--btn-bg);
            border: 1px solid var(--btn-border);
            border-radius: 30px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 2px 8px var(--shadow-color);
            transition: transform 0.2s, background 0.2s, left 0.3s;
            flex-shrink: 0;
            line-height: 1;
            position: absolute;
            top: 1.5rem;
            right: -12px;  /* 一半露在外面 */
            z-index: 20;
        }

        .sidebar-arrow:hover {
            background: var(--item-hover);
            border-color: var(--accent-hover);
            transform: scale(1.05);
        }

        /* 收缩时箭头的位置调整 - 始终可见 */
        .sidebar.collapsed .sidebar-arrow {
            right: 50%;
            transform: translateX(50%) rotate(180deg);  /* 居中且旋转 */
            background: var(--accent-color);
            border-color: var(--accent-hover);
            color: white;
        }

        .sidebar.collapsed .sidebar-arrow:hover {
            background: var(--accent-hover);
        }

        /* 公告列表 */
        .announcement-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .announcement-item {
            background: var(--announcement-bg);
            padding: 0.8rem 1rem;
            border-radius: 18px;
            border-left: 4px solid var(--accent-color);
            font-size: 0.95rem;
            color: var(--text-secondary);
            box-shadow: 0 2px 4px var(--shadow-color);
            transition: background 0.3s, border-color 0.3s;
        }

        .announcement-item .date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
            display: block;
        }

        .divider {
            height: 1px;
            background: var(--sidebar-border);
            margin: 0.5rem 0;
            transition: background 0.3s;
        }

        .menu-item-side {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.6rem 0.8rem;
            border-radius: 14px;
            color: var(--text-secondary);
            transition: 0.1s;
            cursor: default;
        }

        .menu-item-side:hover {
            background: var(--item-hover);
        }

        /* 右侧主要内容区 */
        .main-content {
            flex: 1;
            background: var(--main-content-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 2rem;
            border: 1px solid var(--sidebar-border);
            box-shadow: 0 10px 25px -12px var(--shadow-color);
            min-height: 60vh;
            transition: background 0.3s, border-color 0.3s;
        }

        .welcome-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        /* 移动端适配 */
        @media screen and (max-width: 700px) {
            .app-container {
                padding: 0 1rem;
                flex-direction: column;
            }
            .sidebar {
                width: 100% !important;
                background: var(--sidebar-bg);
                border: 1px solid var(--sidebar-border);
            }
            .sidebar.collapsed {
                width: 48px !important;
                background: transparent;
                border: none;
            }
            .sidebar-arrow {
                right: -8px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 (三道杠仅作装饰，不控制侧边栏) -->
    <header class="site-header">
        <div class="navbar">
            <!-- 左侧：三道杠（无功能）+ Logo -->
            <div class="left-area">
                <div class="menu-toggle-btn">☰</div>  <!-- 改为div，不是按钮，完全无交互 -->
                <div class="logo-area">
                    <div class="logo-mark">N</div>
                    <span class="brand-name">NavHub</span>
                </div>
            </div>

            <input type="checkbox" id="menu-check">
            <ul class="nav-menu">
                <li class="nav-item active">首页</li>
                <li class="nav-item">产品</li>
                <li class="nav-item">解决方案</li>
                <li class="nav-item">资源</li>
                <li class="nav-item">关于我们</li>
                <li class="nav-item">帮助</li>
            </ul>

            <!-- 右侧：登录/注册 + 主题切换 -->
            <div class="action-buttons">
                <button class="btn-text">登录</button>
                <button class="btn-text register">注册</button>
                <button class="theme-toggle" id="themeToggleBtn" aria-label="切换主题">🌙</button>
            </div>

            <!-- 移动端汉堡菜单 (仍保留) -->
            <div class="mobile-toggle">
                <label for="menu-check" class="hamburger-icon">☰</label>
            </div>
            <label for="menu-check" class="menu-overlay"></label>
        </div>
    </header>

    <!-- 主体区域：侧边栏 + 内容 -->
    <div class="app-container">
        <!-- 侧边栏 (默认展开，由内部小箭头控制伸缩) -->
        <aside class="sidebar" id="sidebar">
            <!-- 小箭头按钮 - 唯一控制伸缩的元素 -->
            <div class="sidebar-arrow" id="sidebarArrowBtn">←</div>

            <div class="sidebar-content">
                <div class="announcement-header">
                    <h3>📢 公告板</h3>
                </div>

                <ul class="announcement-list">
                    <li class="announcement-item">
                        系统维护通知
                        <span class="date">2025-03-17</span>
                    </li>
                    <li class="announcement-item">
                        新版本 v2.5 发布
                        <span class="date">2025-03-15</span>
                    </li>
                    <li class="announcement-item">
                        月度安全报告
                        <span class="date">2025-03-12</span>
                    </li>
                </ul>

                <div class="divider"></div>

                <div class="menu-item-side">
                    <span>📋</span> <span>最新动态</span>
                </div>
                <div class="menu-item-side">
                    <span>📌</span> <span>pinned 消息</span>
                </div>
                <div class="menu-item-side">
                    <span>📅</span> <span>活动日历</span>
                </div>
            </div>
        </aside>

        <!-- 右侧主要内容演示区 -->
        <main class="main-content">
            <h1 class="welcome-title">欢迎使用</h1>
            <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 1.2rem;">
                点击侧边栏右侧的「小箭头」可以完全收缩/展开侧边栏。收缩后只露出箭头，再次点击展开。
            </p>
            <p style="color: var(--text-muted);">
                左上角的三道杠现在是纯装饰，不控制侧边栏。右侧「🌙」可切换白天/黑夜主题。
                所有动画平滑过渡。
            </p>
            <div style="margin-top: 2rem; background: var(--announcement-bg); padding: 1.2rem; border-radius: 20px; color: var(--text-secondary); transition: background 0.3s;">
                ⚡ 公告内容已更新。侧边栏收缩后完全透明，只留下一个居中的小箭头。
            </div>
        </main>
    </div>

    <script>
        (function() {
            // --- 侧边栏控制 (仅由内部箭头控制) ---
            const sidebar = document.getElementById('sidebar');
            const sidebarArrowBtn = document.getElementById('sidebarArrowBtn');

            // 切换侧边栏收缩状态
            function toggleSidebar() {
                sidebar.classList.toggle('collapsed');
            }

            // 箭头点击事件
            sidebarArrowBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleSidebar();
            });

            // --- 白天/黑夜主题切换 ---
            const themeToggleBtn = document.getElementById('themeToggleBtn');
            const body = document.body;

            // 检查本地存储主题
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark-theme');
                themeToggleBtn.textContent = '☀️';  // 白天图标
            } else {
                themeToggleBtn.textContent = '🌙';  // 黑夜图标
            }

            themeToggleBtn.addEventListener('click', function() {
                body.classList.toggle('dark-theme');
                
                // 更新按钮图标和本地存储
                if (body.classList.contains('dark-theme')) {
                    themeToggleBtn.textContent = '☀️';
                    localStorage.setItem('theme', 'dark');
                } else {
                    themeToggleBtn.textContent = '🌙';
                    localStorage.setItem('theme', 'light');
                }
            });

            // --- 导航栏移动端菜单功能 (保持不变) ---
            const menuCheck = document.getElementById('menu-check');
            const navItems = document.querySelectorAll('.nav-item');
            const overlay = document.querySelector('.menu-overlay');
            
            navItems.forEach(item => {
                item.addEventListener('click', function() {
                    navItems.forEach(n => n.classList.remove('active'));
                    this.classList.add('active');
                    if (window.innerWidth <= 900 && menuCheck) {
                        menuCheck.checked = false;
                    }
                });
            });

            window.addEventListener('resize', function() {
                if (window.innerWidth > 900 && menuCheck) {
                    menuCheck.checked = false;
                }
            });

            if (overlay) {
                overlay.addEventListener('click', function() {
                    if (menuCheck) menuCheck.checked = false;
                });
            }
        })();
    </script>
</body>
</html>
